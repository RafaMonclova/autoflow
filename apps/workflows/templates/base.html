<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFlow - Minimal SaaS Automation</title>
    <!-- Tailwind CSS (CDN for MVP) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    </style>
    <style>
        .htmx-request.loading-bar { opacity: 1; animation: loading 1.5s infinite linear; }
        @keyframes loading { 0% { width: 0%; left: 0%; } 50% { width: 50%; left: 25%; } 100% { width: 0%; left: 100%; }}
    </style>
    <!-- HTMX (CDN) -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js (CDN for MVP) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 antialiased htmx-settling" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <!-- Navbar Minimalista -->
    <nav class="bg-slate-900 shadow-md border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="{% url 'dashboard' %}" class="flex-shrink-0 flex items-center space-x-2">
                        <svg class="h-8 w-8 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        <span class="text-white text-xl font-extrabold tracking-tight">AutoFlow</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    {% if user.is_authenticated %}
                        <span class="text-gray-300 text-sm font-medium">Hola, {{ user.username }}</span>
                        <!-- Asumimos que tienes logout estándar de Django o usar un enlace provisorio -->
                        <a href="/admin/logout/" class="text-gray-400 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors bg-slate-800 hover:bg-slate-700">Salir</a>
                    {% else %}
                        <span class="text-gray-400 text-sm">Sesión no iniciada</span>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Layout -->
    <main class="max-w-6xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Indicador Global HTMX -->
    <div id="htmx-global-indicator" class="htmx-indicator fixed top-0 left-0 w-full h-1 bg-indigo-600 transition-all duration-300 opacity-0 loading-bar z-50"></div>
    <style>
        .htmx-request.loading-bar { opacity: 1; animation: loading 1.5s infinite linear; }
        @keyframes loading { 0% { width: 0%; left: 0%; } 50% { width: 50%; left: 25%; } 100% { width: 0%; left: 100%; }}
    </style>

    <!-- Contenedor de Toasts de Notificación -->
    <div id="notification-toasts" class="fixed top-20 right-4 z-[100] flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <style>
        @keyframes toastSlideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastSlideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(100%); } }
        @keyframes toastProgress { from { width: 100%; } to { width: 0%; } }
        .toast-enter { animation: toastSlideIn 0.35s ease-out forwards; }
        .toast-exit { animation: toastSlideOut 0.3s ease-in forwards; }
        .toast-progress { animation: toastProgress 6s linear forwards; }
    </style>

    {% if ws_token and ws_user_id %}
    <script>
    (function() {
        const userId = {{ ws_user_id }};
        const token = "{{ ws_token }}";
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl = `${protocol}://${window.location.host}/ws/notifications/${userId}/?token=${token}`;
        let ws = null;
        let reconnectTimer = null;

        function connect() {
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('[AutoFlow WS] Conectado a notificaciones');
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    showToast(data.notification || 'Notificación', data.text || '');
                } catch(e) {
                    console.error('[AutoFlow WS] Error parseando mensaje:', e);
                }
            };

            ws.onclose = function(e) {
                console.log('[AutoFlow WS] Desconectado, reintentando en 5s...', e.code);
                clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connect, 5000);
            };

            ws.onerror = function(err) {
                console.error('[AutoFlow WS] Error:', err);
                ws.close();
            };
        }

        function showToast(title, body) {
            const container = document.getElementById('notification-toasts');
            const toast = document.createElement('div');
            toast.className = 'pointer-events-auto bg-white border border-gray-200 rounded-xl shadow-lg p-4 toast-enter relative overflow-hidden';
            toast.innerHTML = `
                <div class="flex items-start gap-3">
                    <div class="flex-shrink-0 h-9 w-9 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-slate-800 truncate">${title}</p>
                        <p class="text-xs text-slate-500 mt-0.5 line-clamp-3">${body}</p>
                    </div>
                    <button onclick="this.closest('.pointer-events-auto').remove()" class="flex-shrink-0 text-gray-400 hover:text-gray-600 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="absolute bottom-0 left-0 h-0.5 bg-indigo-500 toast-progress rounded-full"></div>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.className = toast.className.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 6000);
        }

        connect();
    })();
    </script>
    {% endif %}
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFlow - Minimal SaaS Automation</title>
    <!-- Tailwind CSS (CDN for MVP) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    </style>
    <style>
        .htmx-request.loading-bar { opacity: 1; animation: loading 1.5s infinite linear; }
        @keyframes loading { 0% { width: 0%; left: 0%; } 50% { width: 50%; left: 25%; } 100% { width: 0%; left: 100%; }}
    </style>
    <!-- HTMX (CDN) -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js (CDN for MVP) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 antialiased htmx-settling" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <!-- Navbar Minimalista -->
    <nav class="bg-slate-900 shadow-md border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="{% url 'dashboard' %}" class="flex-shrink-0 flex items-center space-x-2">
                        <svg class="h-8 w-8 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        <span class="text-white text-xl font-extrabold tracking-tight">AutoFlow</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    {% if user.is_authenticated %}
                        <span class="text-gray-300 text-sm font-medium">Hola, {{ user.username }}</span>
                        <!-- Asumimos que tienes logout estándar de Django o usar un enlace provisorio -->
                        <a href="/admin/logout/" class="text-gray-400 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors bg-slate-800 hover:bg-slate-700">Salir</a>
                    {% else %}
                        <span class="text-gray-400 text-sm">Sesión no iniciada</span>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Layout -->
    <main class="max-w-6xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Indicador Global HTMX -->
    <div id="htmx-global-indicator" class="htmx-indicator fixed top-0 left-0 w-full h-1 bg-indigo-600 transition-all duration-300 opacity-0 loading-bar z-50"></div>
    <style>
        .htmx-request.loading-bar { opacity: 1; animation: loading 1.5s infinite linear; }
        @keyframes loading { 0% { width: 0%; left: 0%; } 50% { width: 50%; left: 25%; } 100% { width: 0%; left: 100%; }}
    </style>
</body>
</html>

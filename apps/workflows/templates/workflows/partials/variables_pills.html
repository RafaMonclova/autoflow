<div class="mt-3">
    <p class="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider">Variables Disponibles (Click para insertar)</p>
    <div class="flex flex-wrap gap-2 max-h-28 overflow-y-auto pr-1">
        {% for key, value in variables.items %}
        <!-- Pill interactiva -->
        <button type="button" 
                @click="insertVariable('{{ key|escapejs }}')" 
                class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-blue-50 text-blue-700 hover:bg-blue-100 hover:text-blue-800 border border-blue-200 focus:outline-none transition-colors"
                title="Valor de prueba: {{ value|truncatechars:50 }}">
            <svg class="w-3 h-3 mr-1 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
            {{ key }}
        </button>
        {% empty %}
        <span class="text-xs text-slate-400 italic mb-2">No hay variables aún. Extrae datos usando un paso anterior de "HTTP Fetch".</span>
        {% endfor %}
    </div>
</div>

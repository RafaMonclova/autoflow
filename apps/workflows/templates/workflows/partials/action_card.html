<div id="action-{{ action.id }}" class="action-block group relative" x-data="actionEditor('{{ action.config_template.text|escapejs }}', '{{ action.config_template.body|escapejs }}')">
    <!-- El conector superior si no es el primer elemento generado dinámicamente -->
    <div class="h-10 w-1 bg-emerald-200 mx-auto -my-1 rounded-full relative z-0 hidden only-not-first"></div>
    
    <div class="bg-white shadow-sm hover:shadow-md rounded-2xl border border-gray-200 p-8 relative z-10 my-1 transition-all duration-200 hover:border-emerald-200">
        
        <!-- Botón de Borrar (Aparece en hover) -->
        <div class="absolute -right-3 -top-3 opacity-0 group-hover:opacity-100 transition-opacity">
            <button hx-post="{% url 'delete_action' action.id %}" hx-target="#action-{{ action.id }}" hx-swap="outerHTML" hx-confirm="¿Estás seguro de que deseas eliminar este bloque de acción?" class="bg-white rounded-full p-2 text-red-500 hover:text-red-600 hover:bg-red-50 shadow-md transition-colors border border-red-100 focus:outline-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </div>

        <form hx-post="{% url 'save_action_config' action.id %}" hx-target="#save-indicator-{{ action.id }}" hx-swap="innerHTML">
            {% csrf_token %}
            
            <!-- Header Acción -->
            <div class="flex items-center mb-6 pb-6 border-b border-gray-100">
                <div class="flex-shrink-0 h-10 w-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center font-bold text-lg shadow-inner">
                    {% if loop_counter %}{{ loop_counter }}{% else %}*{% endif %}
                </div>
                <div class="ml-4 flex-1">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Tipo de Acción</label>
                    <select x-ref="actionType" name="action_type" class="block w-full py-2.5 px-4 pr-8 border border-slate-200 bg-slate-50 hover:bg-white rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 text-slate-800 font-semibold transition-colors" onchange="const val = this.value; document.getElementById('config-tel-{{ action.id }}').style.display = val === 'TELEGRAM' ? 'block' : 'none'; document.getElementById('config-email-{{ action.id }}').style.display = val === 'EMAIL' ? 'block' : 'none'; document.getElementById('config-fetch-{{ action.id }}').style.display = val === 'HTTP_FETCH' ? 'block' : 'none';">
                        <option value="TELEGRAM" {% if action.action_type == 'TELEGRAM' %}selected{% endif %}>🚀 Enviar Mensaje de Telegram</option>
                        <option value="EMAIL" {% if action.action_type == 'EMAIL' %}selected{% endif %}>✉️ Enviar Correo Electrónico</option>
                        <option value="HTTP_FETCH" {% if action.action_type == 'HTTP_FETCH' %}selected{% endif %}>🌐 Obtener Datos (HTTP Fetch)</option>
                    </select>
                </div>
            </div>

            <div class="space-y-5">
                <!-- TELEGRAM CONFIG -->
                <div id="config-tel-{{ action.id }}" style="display: {% if action.action_type == 'TELEGRAM' %}block{% else %}none{% endif %};" class="animate-fade-in">
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Chat ID de destino <span class="text-red-500">*</span></label>
                        <input type="text" name="telegram_chat_id" value="{{ action.config_template.chat_id|default:'' }}" class="focus:ring-emerald-500 focus:border-emerald-500 block w-full shadow-sm sm:text-sm border-slate-300 rounded-lg p-2.5 border" placeholder="Ej: -10012345678">
                        <p class="mt-1 text-xs text-slate-500">El ID numérico del grupo o usuario de Telegram.</p>
                    </div>
                    <div>
                        <label class="flex justify-between items-end mb-1">
                            <span class="block text-sm font-semibold text-slate-700">Contenido del Mensaje <span class="text-red-500">*</span></span>
                            <span class="text-xs text-indigo-600 font-mono bg-indigo-50 px-2 py-0.5 rounded border border-indigo-100">Soporta {% templatetag openvariable %}variable{% templatetag closevariable %}</span>
                        </label>
                        <textarea x-model="telegramText" name="telegram_text" rows="4" class="shadow-sm focus:ring-emerald-500 focus:border-emerald-500 block w-full sm:text-sm border-slate-300 rounded-lg p-3 border font-mono resize-y" placeholder="¡Nuevo lead entrante!&#10;Nombre: {% templatetag openvariable %}lead.name{% templatetag closevariable %}&#10;Email: {% templatetag openvariable %}lead.email{% templatetag closevariable %}"></textarea>
                    </div>
                </div>

                <!-- EMAIL CONFIG -->
                <div id="config-email-{{ action.id }}" style="display: {% if action.action_type == 'EMAIL' %}block{% else %}none{% endif %};" class="animate-fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Para (Email) <span class="text-red-500">*</span></label>
                            <input type="text" name="email_to" value="{{ action.config_template.to_email|default:'' }}" class="focus:ring-emerald-500 focus:border-emerald-500 block w-full shadow-sm sm:text-sm border-slate-300 rounded-lg p-2.5 border" placeholder="ej: admin@autoflow.com o {% templatetag openvariable %}lead.email{% templatetag closevariable %}">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Asunto <span class="text-red-500">*</span></label>
                            <input type="text" name="email_subject" value="{{ action.config_template.subject|default:'' }}" class="focus:ring-emerald-500 focus:border-emerald-500 block w-full shadow-sm sm:text-sm border-slate-300 rounded-lg p-2.5 border" placeholder="Alerta: Nuevo Registro">
                        </div>
                    </div>
                    <div>
                        <label class="flex justify-between items-end mb-1">
                            <span class="block text-sm font-semibold text-slate-700">Cuerpo del correo</span>
                            <span class="text-xs text-indigo-600 font-mono bg-indigo-50 px-2 py-0.5 rounded border border-indigo-100">Soporta {% templatetag openvariable %}variable{% templatetag closevariable %}</span>
                        </label>
                        <textarea x-model="emailBody" name="email_body" rows="4" class="shadow-sm focus:ring-emerald-500 focus:border-emerald-500 block w-full sm:text-sm border-slate-300 rounded-lg p-3 border font-mono resize-y" placeholder="Hola,&#10;El usuario {% templatetag openvariable %}user.name{% templatetag closevariable %} se ha registrado correctamente."></textarea>
                    </div>
                </div>
                
                <!-- HTTP FETCH CONFIG -->
                <div id="config-fetch-{{ action.id }}" style="display: {% if action.action_type == 'HTTP_FETCH' %}block{% else %}none{% endif %};" class="animate-fade-in">
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">URL Obtenedor Datos (GET) <span class="text-red-500">*</span></label>
                        <input type="text" name="fetch_url" value="{{ action.config_template.url|default:'' }}" class="focus:ring-emerald-500 focus:border-emerald-500 block w-full shadow-sm sm:text-sm border-slate-300 rounded-lg p-2.5 border text-mono" placeholder="https://api.ejemplo.com/datos">
                    </div>
                    
                    <div class="mt-4 p-4 bg-slate-50 border border-slate-200 rounded-lg">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-semibold text-slate-700">Probar extracción:</span>
                            <button type="button" 
                                    hx-post="{% url 'test_action_fetch' action.id %}" 
                                    hx-target="#fetch-result-{{ action.id }}" 
                                    class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded shadow-sm text-slate-700 bg-white hover:bg-slate-100 border-slate-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors">
                                Probar Petición
                            </button>
                        </div>
                        <div id="fetch-result-{{ action.id }}">
                            {% if action.sample_payload %}
                            <span class="text-emerald-600 text-sm font-medium">✅ Datos obtenidos previamente</span>
                            {% else %}
                            <span class="text-slate-500 text-sm italic">Sin datos. Guarda la URL primero y pruébala.</span>
                            {% endif %}
                        </div>
                    </div>
                </div>

                <!-- VARIABLES DYNAMIC PILLS CONTAINER -->
                <div hx-get="{% url 'available_variables' workflow.id %}" hx-trigger="load, click from:body delay:500ms"></div>

            </div>

            <div class="mt-6 pt-4 border-t border-gray-50 flex items-center justify-end bg-gray-50/50 -mx-8 -mb-8 px-8 py-4 rounded-b-2xl">
                <span id="save-indicator-{{ action.id }}" class="mr-4 transition-all"></span>
                <button type="submit" class="inline-flex items-center px-5 py-2.5 border border-transparent outline-none text-sm font-bold rounded-lg shadow-sm text-white bg-slate-800 hover:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-colors">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    Guardar Configuración
                </button>
            </div>
        </form>
    </div>
    
    <!-- El conector inferior siempre fijo -->
    <div class="h-10 w-1 bg-gradient-to-b from-emerald-200 to-indigo-200 mx-auto -my-1 rounded-full relative z-0 last-connector"></div>
</div>

<style>
    /* Ocultar el último conector o ajustarlo */
    .action-block:last-of-type .last-connector {
        background: theme('colors.indigo.200'); /* Conecta al botón añadir */
    }
    
    /* Pequeña animación para la caja */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
</style>

<!-- Nombre del workflow: click para editar inline -->
<div id="workflow-name-block" class="flex items-center gap-2 group" x-data="{ editing: false }">
    <h1 x-show="!editing" class="text-3xl font-extrabold text-slate-900 tracking-tight cursor-pointer hover:text-indigo-600 transition-colors flex items-center gap-2" @click="editing = true; $nextTick(() => $refs.nameInput.focus())" title="Click para renombrar">
        {{ workflow.name }}
        <svg class="w-4 h-4 text-slate-300 group-hover:text-indigo-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
    </h1>
    <form x-show="editing" hx-post="{% url 'rename_workflow' workflow.pk %}" hx-target="#workflow-name-block" hx-swap="outerHTML" class="flex items-center gap-2">
        {% csrf_token %}
        <input x-ref="nameInput" type="text" name="name" value="{{ workflow.name }}" class="text-2xl font-extrabold text-slate-900 bg-white border-2 border-indigo-300 rounded-lg px-3 py-1 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 w-80" @keydown.escape="editing = false" />
        <button type="submit" class="p-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors" title="Guardar">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </button>
        <button type="button" class="p-1.5 bg-slate-200 text-slate-600 rounded-lg hover:bg-slate-300 transition-colors" @click="editing = false" title="Cancelar">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </form>
</div>
